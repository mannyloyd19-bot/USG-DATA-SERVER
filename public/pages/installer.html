<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Installer · USG DATA SERVER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{--panel:#ffffffcc;--text:#1f2a44;--muted:#7b8498;--line:#d6dbe6;--blue:#2f6fda;--blue-soft:#e7eefc;--danger:#c0392b;--success:#1f7a3d;--shadow:0 12px 30px rgba(31,42,68,.08);--radius:28px}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#eef1f7 0%,#e8ecf4 100%);color:var(--text)}
    .wrap{display:grid;grid-template-columns:340px 1fr;gap:24px;min-height:100vh;padding:28px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(16px);padding:24px}
    .small{font-size:12px;letter-spacing:.18em;color:var(--muted);font-weight:700}
    h1,h2{margin:8px 0 18px}
    input{width:100%;padding:14px 16px;border-radius:18px;border:1px solid var(--line);background:#fff;margin-bottom:12px;font-size:15px}
    button{padding:14px 18px;border:none;border-radius:18px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
    pre{margin:0;background:#050814;color:#f3f6ff;padding:18px;border-radius:18px;overflow:auto;font-size:12px}
    .check-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
    .ok{color:var(--success);font-weight:700}
    .bad{color:var(--danger);font-weight:700}
    .message{min-height:20px;margin-top:12px}
    .message[data-state="success"]{color:var(--success)}
    .message[data-state="error"]{color:var(--danger)}
    @media (max-width:1100px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="small">FIRST-RUN SETUP</div>
      <h1>Installer</h1>
      <form id="install-form">
        <input id="installer-app-name" placeholder="Application Name" value="USG DATA SERVER" required>
        <input id="installer-company-name" placeholder="Company Name" value="USG" required>
        <input id="installer-admin-username" placeholder="Admin Username" value="admin" required>
        <input id="installer-admin-password" type="password" placeholder="Admin Password" required>
        <button type="submit">Complete Installation</button>
      </form>
      <div class="message" id="install-message"></div>
    </section>

    <section class="card">
      <div class="small">SYSTEM READINESS</div>
      <h2>System Check</h2>
      <div id="system-check"></div>
      <hr style="border:none;border-top:1px solid var(--line);margin:20px 0">
      <div class="small">INSTALL STATUS</div>
      <pre id="install-status">Loading...</pre>
    </section>
  </div>

  <script src="/js/installer.js"></script>
  <script src="/js/company-brand.js"></script>
</body>
</html>
