<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fields · USG DATA SERVER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{--panel:#ffffffcc;--text:#1f2a44;--muted:#7b8498;--line:#d6dbe6;--blue:#2f6fda;--blue-soft:#e7eefc;--shadow:0 12px 30px rgba(31,42,68,.08);--radius:28px}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#eef1f7 0%,#e8ecf4 100%);color:var(--text)}
    .wrap{display:grid;grid-template-columns:300px 1fr;gap:24px;min-height:100vh;padding:28px}
    .sidebar,.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(16px)}
    .sidebar{padding:24px}
    .brand{display:flex;gap:14px;align-items:center;margin-bottom:28px}
    .logo{width:60px;height:60px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(180deg,#3d82ee,#2f6fda);color:#fff;font-size:34px;font-weight:700}
    .small{font-size:12px;letter-spacing:.18em;color:var(--muted);font-weight:700}
    .brand h1{margin:4px 0 0;font-size:28px;line-height:1}
    .nav a,.nav button{display:block;width:100%;text-align:left;padding:16px 18px;margin-bottom:12px;border-radius:20px;text-decoration:none;color:var(--text);font-weight:600;border:1px solid var(--line);background:#ffffff80;cursor:pointer}
    .nav a.active{background:var(--blue-soft);color:var(--blue)}
    .main{display:grid;grid-template-columns:380px 1fr;gap:24px}
    .card{padding:24px}
    input,select,label{font-size:15px}
    input,select{width:100%;padding:14px 16px;border-radius:18px;border:1px solid var(--line);background:#fff;margin-bottom:12px}
    .checks{display:grid;gap:8px;margin-bottom:12px;color:var(--muted)}
    button.primary{padding:14px 18px;border:none;border-radius:18px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
    .item-card{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff;margin-bottom:12px}
    .muted{color:var(--muted)}
    @media (max-width:1100px){.wrap{grid-template-columns:1fr}.main{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">U</div>
        <div><div class="small">PRIVATE DATA PLATFORM</div><h1>USG DATA<br>SERVER</h1></div>
      </div>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/pages/permissions-pro.html">Permissions Pro</a>
        <a href="/pages/users.html">Users</a>
        <a href="/pages/collections.html">Collections</a>
        <a class="active" href="/pages/fields.html">Fields</a>
        <a href="/pages/files.html">Files</a>
        <a href="/pages/api-keys.html">API Keys</a>
        <a href="/pages/relational.html">Relational</a>
        <a href="/pages/relationships.html">Relationships</a>
        <a href="/pages/webhooks.html">Webhooks</a>
        <a href="/pages/realtime.html">Realtime</a>
        <a href="/pages/settings.html">Settings</a>
        <a href="/pages/audit-logs.html">Audit Logs</a>
        <a href="/pages/backups.html">Backups</a>
        <a href="/pages/sdk.html">SDK</a>
        <a href="/pages/release.html">Release</a>
        <button onclick="logout()">Logout</button>
      </nav>
    </aside>

    <main class="main">
      <section class="card">
        <div class="small">SCHEMA BUILDER</div>
        <h2>Create Field</h2>
        <select id="field-collection"></select>
        <form id="field-form">
          <input id="field-name" placeholder="Field name" required>
          <select id="field-type">
            <option value="TEXT">TEXT</option>
            <option value="NUMBER">NUMBER</option>
            <option value="BOOLEAN">BOOLEAN</option>
            <option value="DATE">DATE</option>
            <option value="DATETIME">DATETIME</option>
            <option value="EMAIL">EMAIL</option>
            <option value="URL">URL</option>
            <option value="JSON">JSON</option>
            <option value="ARRAY">ARRAY</option>
          </select>
          <div class="checks">
            <label><input type="checkbox" id="field-required"> Required</label>
            <label><input type="checkbox" id="field-searchable" checked> Searchable</label>
            <label><input type="checkbox" id="field-sortable" checked> Sortable</label>
          </div>
          <button class="primary" type="submit">Create Field</button>
        </form>
      </section>

      <section class="card">
        <div class="small">COLLECTION FIELDS</div>
        <h2>Field List</h2>
        <div id="field-list"></div>
      </section>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/fields.js"></script>
  <script src="/js/company-brand.js"></script>
</body>
</html>
