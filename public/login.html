<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login · USG DATA SERVER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --bg:#eceff5;
      --panel:#ffffffcc;
      --text:#1f2a44;
      --muted:#7b8498;
      --line:#d6dbe6;
      --blue:#2f6fda;
      --blue-soft:#e7eefc;
      --shadow:0 12px 30px rgba(31,42,68,.08);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
      background:linear-gradient(180deg,#eef1f7 0%,#e8ecf4 100%);
      color:var(--text);
    }
    .card{
      width:min(100%,430px);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:32px;
      padding:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
    }
    .small{font-size:12px;letter-spacing:.18em;color:var(--muted);font-weight:700}
    h1{margin:8px 0 20px;font-size:34px}
    .logo{
      width:62px;height:62px;border-radius:20px;
      display:grid;place-items:center;
      background:linear-gradient(180deg,#3d82ee,#2f6fda);
      color:#fff;font-size:34px;font-weight:800;
      margin-bottom:14px;
    }
    input{
      width:100%;
      padding:15px 16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      margin-bottom:14px;
      font-size:16px;
    }
    button{
      width:100%;
      padding:15px 18px;
      border:none;
      border-radius:18px;
      background:var(--blue);
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    .error{
      min-height:20px;
      color:#c0392b;
      margin:4px 0 12px;
      font-size:14px;
    }
    .hint{
      margin-top:14px;
      color:var(--muted);
      font-size:14px;
    }
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <div class="logo">U</div>
    <div class="small">PRIVATE DATA PLATFORM</div>
    <h1>Sign in</h1>
    <input id="username" placeholder="Username" value="admin" required>
    <input id="password" type="password" placeholder="Password" value="admin123" required>
    <div class="error" id="error-box"></div>
    <button type="submit">Login to USG DATA SERVER</button>
    <div class="hint">Default login: admin / admin123</div>
  </form>
  <script src="/js/login.js"></script>
</body>
</html>
