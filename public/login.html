<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In · USG DATA SERVER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --panel:#ffffffd9;
      --text:#1f2a44;
      --muted:#7b8498;
      --line:#d6dbe6;
      --blue:#2f6fda;
      --blue-soft:#e7eefc;
      --danger:#c0392b;
      --success:#1f7a3d;
      --shadow:0 12px 30px rgba(31,42,68,.08);
      --radius:32px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
      background:linear-gradient(180deg,#eef1f7 0%,#e8ecf4 100%);
      color:var(--text);
    }
    .card{
      width:min(100%,500px);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:32px;
      padding:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
    }
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .logo{
      width:70px;height:70px;border-radius:22px;display:grid;place-items:center;
      background:linear-gradient(180deg,#3d82ee,#2f6fda);color:#fff;font-size:34px;font-weight:800;overflow:hidden;
    }
    .small{font-size:12px;letter-spacing:.18em;color:var(--muted);font-weight:700}
    h1{margin:6px 0 0;font-size:34px;line-height:1}
    .tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:18px 0}
    .tab-btn{
      padding:12px 14px;border-radius:16px;border:1px solid var(--line);
      background:#fff;color:var(--text);font-weight:700;cursor:pointer
    }
    .tab-btn.active{background:var(--blue-soft);color:var(--blue)}
    input,select{
      width:100%;padding:15px 16px;border-radius:18px;border:1px solid var(--line);
      background:#fff;margin-bottom:14px;font-size:16px
    }
    button.primary{
      width:100%;padding:15px 18px;border:none;border-radius:18px;background:var(--blue);
      color:#fff;font-size:16px;font-weight:700;cursor:pointer
    }
    .message{min-height:20px;margin:4px 0 12px;font-size:14px}
    .message[data-state="error"]{color:var(--danger)}
    .message[data-state="success"]{color:var(--success)}
    .hint{margin-top:14px;color:var(--muted);font-size:14px;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">
        <img src="/assets/company-logo.png" alt="UNI-SOGOOD" style="width:100%;height:100%;object-fit:contain;border-radius:18px"
             onerror="this.style.display='none'; this.parentNode.innerHTML='U';">
      </div>
      <div>
        <div class="small">PRIVATE DATA PLATFORM</div>
        <h1>UNI-SOGOOD<br>USG DATA SERVER</h1>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn" data-open="login" type="button">Sign In</button>
      <button class="tab-btn" data-open="create" type="button">Create Account</button>
      <button class="tab-btn" data-open="forgot" type="button">Reset Password</button>
    </div>

    <div class="message" id="message-box" data-state="error"></div>

    <form id="login-form" data-tab="login">
      <input id="login-username" placeholder="Username" autocomplete="username" required>
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required>
      <button class="primary" type="submit">Sign In</button>
    </form>

    <form id="create-form" data-tab="create" style="display:none">
      <input id="create-masterkey" type="password" placeholder="Master Setup Key" autocomplete="off" required>
      <input id="create-username" placeholder="New Username" required>
      <input id="create-password" type="password" placeholder="New Password" required>
      <select id="create-role">
        <option value="admin">admin</option>
        <option value="super_admin">super_admin</option>
      </select>
      <button class="primary" type="submit">Create Account</button>
    </form>

    <form id="forgot-form" data-tab="forgot" style="display:none">
      <input id="forgot-masterkey" type="password" placeholder="Master Setup Key" autocomplete="off" required>
      <input id="forgot-username" placeholder="Username" required>
      <input id="forgot-password" type="password" placeholder="New Password" required>
      <button class="primary" type="submit">Reset Password</button>
    </form>

    <div class="hint">
      Administrative account actions require the configured master setup key.
    </div>
  </div>

  <script src="/js/login.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
