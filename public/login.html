<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In · NexaCore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --panel:#ffffffd9;
      --text:#1f2a44;
      --muted:#c8d2e6;
      --line:#d6dbe6;
      --blue:#2f6fda;
      --blue-soft:#e7eefc;
      --danger:#c0392b;
      --success:#1f7a3d;
      --shadow:0 18px 45px rgba(31,42,68,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
      background:linear-gradient(180deg,#081327 0%,#0b1a36 100%);
      color:#f4f7ff;
    }
    .login-shell{
      width:min(100%,780px);
      background:rgba(10,24,52,.92);
      border:1px solid rgba(255,255,255,.10);
      border-radius:36px;
      padding:34px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:22px;
    }
    .logo{
      width:86px;
      height:86px;
      border-radius:24px;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#3d82ee,#2f6fda);
      color:#fff;
      font-size:34px;
      font-weight:800;
      overflow:hidden;
      flex:0 0 auto;
    }
    .small{
      font-size:12px;
      letter-spacing:.18em;
      color:#d7e2ff;
      font-weight:700;
      text-transform:uppercase;
    }
    h1{
      margin:6px 0 0;
      font-size:40px;
      line-height:1;
    }
    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin:22px 0;
    }
    .tab-btn{
      padding:14px 16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.08);
      color:#f4f7ff;
      font-weight:700;
      cursor:pointer;
    }
    .tab-btn.active{
      background:rgba(79,128,255,.22);
      color:#9fc0ff;
    }
    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      align-items:start;
    }
    .form-panel,
    .side-panel{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      border-radius:26px;
      padding:22px;
    }
    .side-panel{
      min-height:100%;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    input,select{
      width:100%;
      padding:16px 18px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.08);
      margin-bottom:14px;
      font-size:16px;
      color:#f4f7ff;
    }
    button.primary{
      width:100%;
      padding:16px 18px;
      border:none;
      border-radius:20px;
      background:var(--blue);
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    .message{
      min-height:20px;
      margin:4px 0 12px;
      font-size:14px;
    }
    .message[data-state="error"]{color:var(--danger)}
    .message[data-state="success"]{color:var(--success)}
    .hint{
      margin-top:14px;
      color:#d7e2ff;
      font-size:14px;
      line-height:1.6;
    }
    .feature-list{
      margin:0;
      padding-left:18px;
      color:#d7e2ff;
      line-height:1.7;
    }
    .feature-list li{margin-bottom:6px}
    input::placeholder{
      color:#d7e2ff;
      opacity:.75;
    }
    @media (max-width: 760px){
      .login-shell{padding:24px}
      .form-grid{grid-template-columns:1fr}
      h1{font-size:34px}
      .tabs{grid-template-columns:1fr}
    }
  </style>
  <link rel="stylesheet" href="/css/pro-ui.css">
  <link rel="stylesheet" href="/css/theme-pro.css">
</head>
<body>
  <div class="login-shell">
    <div class="brand">
      <div class="logo">
        <img src="/assets/company-logo.png" alt="NexaCore" style="width:100%;height:100%;object-fit:contain;border-radius:18px"
             onerror="this.style.display='none'; this.parentNode.innerHTML='U';">
      </div>
      <div>
        <div class="small">NexaCore Platform Engine</div>
        <h1>NexaCore</h1>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn" data-open="login" type="button">Sign In</button>
      <button class="tab-btn" data-open="create" type="button">Create Account</button>
      <button class="tab-btn" data-open="forgot" type="button">Reset Password</button>
    </div>

    <div class="form-grid">
      <div class="form-panel">
        <div class="message" id="message-box" data-state="error"></div>

        <form id="login-form" data-tab="login">
          <input id="login-username" placeholder="Username" autocomplete="username" required>
          <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required>
          <button class="primary" type="submit">Sign In</button>
        </form>

        <form id="create-form" data-tab="create" style="display:none">
          <input id="create-masterkey" type="password" placeholder="Master Key" autocomplete="off" required>
          <input id="create-username" placeholder="Username" required>
          <input id="create-password" type="password" placeholder="Password" required>
          <select id="create-role">
            <option value="admin">Admin</option>
            <option value="super_admin">Super Admin</option>
          </select>
          <button class="primary" type="submit">Create Account</button>
        </form>

        <form id="forgot-form" data-tab="forgot" style="display:none">
          <input id="forgot-masterkey" type="password" placeholder="Master Key" autocomplete="off" required>
          <input id="forgot-username" placeholder="Username" required>
          <input id="forgot-password" type="password" placeholder="New Password" required>
          <button class="primary" type="submit">Reset Password</button>
        </form>
      </div>

      <aside class="side-panel">
        <div>
          <div class="small">Access Panel</div>
          <h2 style="margin:8px 0 14px">Secure Access</h2>
          <ul class="feature-list">
            <li>Administrative access</li>
            <li>Account management</li>
            <li>Password reset tools</li>
            <li>System control interface</li>
          </ul>
        </div>

        <div class="hint">
          Authorized access only.
        </div>
      </aside>
    </div>
  </div>

  <script src="/js/login.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/pro-ui.js"></script>
  <script src="/js/theme-pro.js"></script>
  <script src="/js/company-brand.js"></script>
  <script src="/js/shared/nexacore-branding.js"></script>
</body>
</html>
