<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexaCore Offline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b1020;
      color:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      padding:24px;
    }
    .card{
      width:min(520px,92vw);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:28px;
      box-shadow:0 18px 50px rgba(0,0,0,.35);
    }
    h1{margin:0 0 12px;font-size:32px}
    p{margin:0;color:rgba(255,255,255,.8);line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <h1>NexaCore Offline</h1>
    <p>The dashboard is temporarily offline or your device lost connectivity. Reconnect to the network and refresh the app.</p>
  </div>
</body>
</html>
